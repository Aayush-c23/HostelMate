<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints - HostelMate</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="dashboard-body">

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h2 style="font-size: 2rem; font-weight: 800; color: var(--text-main);">Complaints</h2>
                <p style="color: var(--text-muted);">Report maintenance issues.</p>
            </div>
            <div class="user-profile"></div>
        </div>

        <div class="card" style="max-width: 800px; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem;">Raise a Ticket</h3>
            <form id="complaintForm">
                <div class="form-group">
                    <label>Issue Category</label>
                    <select id="category" class="form-control">
                        <option>Electrical (Fan/Light)</option>
                        <option>Plumbing (Water/Tap)</option>
                        <option>Furniture (Bed/Table)</option>
                        <option>Cleaning / Hygiene</option>
                        <option>Wi-Fi / Internet</option>
                        <option>Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="desc" class="form-control" rows="3" placeholder="Describe the issue in detail..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Room Number</label>
                    <input id="roomNo" class="form-control" value="Loading..." disabled> 
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                    Submit Complaint
                </button>
            </form>
        </div>

        <h3 style="margin-bottom: 1rem; font-size: 1.5rem; font-weight: 700;">My Tickets</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Category</th>
                        <th>Details</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="complaintTableBody">
                    <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="scripts/storage.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/layout.js"></script>
    <script src="scripts/complaints.js"></script>
</body>
</html>
