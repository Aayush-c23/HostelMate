<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HostelMate</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="dashboard-body">
    
    <main class="main-content">
        <div class="top-bar">
            <div>
                <p id="dash-date" style="font-weight: 600; color: var(--primary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;"></p>
            </div>
            <div class="user-profile"></div>
        </div>

        <div id="student-view" style="display:none;">
            <div style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 3rem; font-weight: 800; color: var(--text-main); letter-spacing: -1px; margin-bottom: 0.5rem;">
                    Welcome back, <span id="user-first-name" style="color: var(--primary);">Student</span>! 👋
                </h1>
                <p style="font-size: 1.2rem; color: var(--text-muted);">Here is your daily overview.</p>
            </div>

            <div class="grid-container">
                <div class="card">
                    <div class="card-title">Attendance</div>
                    <div class="card-value" style="color: #10B981;">85%</div>
                </div>
                <div class="card" style="background: linear-gradient(135deg, #4F86F7 0%, #3a6bd6 100%); color: white;">
                    <div class="card-title" style="color: rgba(255,255,255,0.8);">Next Meal (Lunch)</div>
                    <div class="card-value" style="font-size: 1.8rem; color:white;" id="mess-lunch">Loading...</div>
                    <a href="mess.html" style="color:white; font-size:0.8rem; margin-top:10px; display:block;">View Menu →</a>
                </div>
                <div class="card">
                    <div class="card-title">Pending Issues</div>
                    <div class="card-value" id="pending-count" style="color: #F59E0B;">0</div>
                </div>
            </div>
            
            <h3 style="margin: 2rem 0 1rem 0;">Latest Notices</h3>
            <div class="table-container">
                <table id="dash-notices"></table>
            </div>
        </div>

        <div id="admin-view" style="display:none;">
            <div style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 3rem; font-weight: 800; color: var(--text-main);">Admin Overview</h1>
                <p style="font-size: 1.2rem; color: var(--text-muted);">Manage hostel operations.</p>
            </div>

            <div class="card" style="margin-bottom: 2rem; border-left: 5px solid var(--primary);">
                <h3 style="margin-bottom: 1rem;">📢 Post New Announcement</h3>
                <form id="noticeForm" style="display:flex; gap:10px; flex-wrap: wrap;">
                    <div style="flex:2">
                        <input id="noticeTitle" class="form-control" placeholder="Notice Title (e.g. Holiday on Friday)" required>
                    </div>
                    <div style="flex:1">
                        <input id="noticeTag" class="form-control" placeholder="Tag (e.g. General)">
                    </div>
                    <button type="submit" class="btn btn-primary">Post Notice</button>
                </form>
            </div>

            <div class="grid-container">
                <div class="card">
                    <div class="card-title">Total Students</div>
                    <div class="card-value">120</div>
                </div>
                <div class="card">
                    <div class="card-title">Open Complaints</div>
                    <div class="card-value" style="color: #EF4444;" id="admin-complaint-count">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Pending Leaves</div>
                    <div class="card-value" style="color: #F59E0B;">5</div>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts/storage.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/layout.js"></script>
    <script src="scripts/dashboard.js"></script>
</body>
</html>
