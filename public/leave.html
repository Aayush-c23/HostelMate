<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Application - HostelMate</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="dashboard-body">

    <main class="main-content">
        <div class="top-bar">
            <div>
                <h2 style="font-size: 2rem; font-weight: 800; color: var(--text-main);">Leave Application</h2>
                <p style="color: var(--text-muted);">Apply for leave or check status.</p>
            </div>
            <div class="user-profile"></div>
        </div>

        <div class="card" style="max-width: 800px; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.2rem;">New Application</h3>
            <form id="leaveForm">
                <div class="form-group">
                    <label>Reason for Leave</label>
                    <input id="reason" class="form-control" placeholder="e.g. Going home for festival" required>
                </div>
                
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label>From Date</label>
                        <input type="date" id="fromDate" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>To Date</label>
                        <input type="date" id="toDate" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                    Apply for Leave
                </button>
            </form>
        </div>

        <h3 style="margin-bottom: 1rem; font-size: 1.5rem; font-weight: 700;">My Leave History</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date Range</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="leaveTableBody">
                    <tr>
                        <td colspan="4" style="text-align:center; color:gray;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="scripts/storage.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/layout.js"></script>
    <script src="scripts/leave.js"></script>
</body>
</html>
