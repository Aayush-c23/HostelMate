<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HostelMate</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" href="assets/logo.png" type="image/png">
</head>
<body class="dashboard-body">
    <main class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h2>My Profile</h2>
                <p>Manage your account settings.</p>
            </div>
            <div class="user-profile"></div>
        </div>

        <div class="card" style="max-width:500px; margin: 0 auto;">
            <div style="text-align:center; margin-bottom:2rem;">
                <img src="assets/avatars/student-avatar.png" style="width:100px; height:100px; border-radius:50%; border:4px solid var(--bg-surface); box-shadow: var(--shadow-md); object-fit: cover;">
                <h3 id="p-name" style="margin-top:1rem; font-size: 1.5rem;">Loading...</h3>
                <p id="p-role" style="color:var(--text-muted); font-weight: 500;">STUDENT</p>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input class="form-control" value="student@hostel.com" disabled style="background-color: #f1f5f9;">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input class="form-control" value="+91 98765 43210">
            </div>
            <div class="form-group">
                <label>Room Number</label>
                <input class="form-control" value="304-B" disabled style="background-color: #f1f5f9;">
            </div>
            
            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Update Details</button>
        </div>
    </main>

    <script src="scripts/storage.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/layout.js"></script>
    <script>
        // Simple inline script to load name
        const u = Storage.getCurrentUser();
        if(u) {
            document.getElementById('p-name').innerText = u.name;
            document.getElementById('p-role').innerText = u.role.toUpperCase();
        }
    </script>
</body>
</html>
